services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ybyra-casting-web
    restart: unless-stopped
    ports:
      - "15593:80"
    networks:
      - cloudflared
    depends_on:
      - ghost
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  ghost:
    image: ghost:5-alpine
    container_name: ybyra-casting-ghost
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "15594:2368"
    environment:
      url: ${GHOST_URL}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      privacy__useUpdateCheck: false
      privacy__useGravatar: false
      privacy__useRpcPing: false
    volumes:
      - ./data/ghost_content:/var/lib/ghost/content
      - ./aiven-ca.crt:/etc/ssl/certs/aiven-ca.crt:ro
      - ./config.production.json:/var/lib/ghost/config.production.json:ro
    networks:
      - cloudflared

networks:
  cloudflared:
    external: true
