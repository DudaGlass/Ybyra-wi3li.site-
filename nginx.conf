server {
listen 80;
server_name _;

root /usr/share/nginx/html;
index index.html;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# HTML - sem cache
location ~* \.html?$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    expires -1;
}

# CSS e JavaScript
location ~* \.(css|js)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
}

# Imagens e fontes
location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri =404;
}

# JSON
location ~* \.json$ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
}

# Dados
location /data/ {
    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
}

# Proxy do RSS do Ghost externo (com fallback para proxy Node.js)
location /rss/ {
    # Tenta primeiro proxy direto para RSS externo
    proxy_pass https://blog.ybyracasting.com/rss/;
    proxy_http_version 1.1;

    proxy_set_header Host blog.ybyracasting.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSL configuration for upstream
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # Error handling - fallback para proxy Node.js
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
}

# Fallback: Proxy do RSS via Node.js
location /rss-proxy/ {
    proxy_pass http://rss-proxy:3001/rss;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
}

# Aplicação
location / {
    try_files $uri $uri/ /index.html;
}

# Bloquear arquivos ocultos
location ~ /\. {
    deny all;
}

error_page 404 /404.html;
error_page 500 502 503 504 /50x.html;

location = /404.html {
    internal;
}

location = /50x.html {
    internal;
}

}
