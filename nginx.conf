server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://api.ybyra.com;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com;
        connect-src 'self' https://api.ybyracasting.com https://api.ybyra.com;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ─── HTML: no-cache (always fresh) ────────────────────────────
    location ~* \.html?$ {
        add Cache-Control "no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # ─── Static Assets: versioned via ?v= query string ───────────
    # Since we use cache busting (style.css?v=...), we can cache
    # aggressively. If no version query, still cache with short TTL.
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # ─── Images & Fonts ────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ─── JSON / Data files ─────────────────────────────────────────
    location ~* \.(json)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # ─── Blog fallback data ────────────────────────────────────────
    location /data/ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate" always;
    }

    # ─── API Proxy (no cache) ──────────────────────────────────────
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Never cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # ─── Main Route ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Block hidden files ────────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ─── Error Pages ───────────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}